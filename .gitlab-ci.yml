image: registry.gitlab.arm.com/intrinsiccv/intrinsiccv:2

build:
  tags:
    - arm64
  script:
    - scripts/ci.sh
  artifacts:
    when: always
    reports:
      junit: build/test-results/**/*.xml
      coverage_report:
        coverage_format: cobertura
        path: build/cobertura-coverage.xml
