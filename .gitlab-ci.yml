image: registry.gitlab.arm.com/intrinsiccv/intrinsiccv:3

.common:
  tags:
    - arm64
  script:
    - scripts/ci.sh
  artifacts:
    when: always
    expire_in: 1 day
    reports:
      junit: build/test-results/**/*.xml
      coverage_report:
        coverage_format: cobertura
        path: build/cobertura-coverage.xml
    paths:
      - public
  coverage: /^branches:\s+([\d\.]+\%)/

# On the main branch publish pages.
pages:
  extends: .common
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# On other branches don't publish pages.
test:
  extends: .common
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
